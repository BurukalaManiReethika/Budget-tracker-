<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget. — Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="app-wrapper">

    <header class="app-header">
      <div class="header-brand">
        <span class="brand-logo">₿</span>
        <div>
          <h1 class="brand-title">Budget.</h1>
          <p class="brand-sub">expense tracker</p>
        </div>
      </div>
      <div class="header-meta">
        <span id="current-month" class="month-label"></span>
      </div>
    </header>

    <section class="stats-row">
      <div class="stat-card">
        <span class="stat-label">Monthly Budget</span>
        <span class="stat-value" id="stat-budget">₹0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Total Spent</span>
        <span class="stat-value spent" id="stat-spent">₹0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Remaining</span>
        <span class="stat-value remaining" id="stat-remaining">₹0</span>
      </div>
    </section>

    <section class="progress-section">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-labels">
        <span id="progress-text" class="progress-text">₹0 spent</span>
        <span id="progress-pct" class="progress-pct">0%</span>
      </div>
    </section>

    <div class="main-grid">

      <div class="left-panel">

        <div class="panel-card">
          <h2 class="panel-title">Set Monthly Budget</h2>
          <div class="input-row">
            <div class="input-wrapper">
              <span class="input-prefix">₹</span>
              <input type="number" id="budget-input" placeholder="e.g. 30000" min="0" />
            </div>
            <button class="btn btn-primary" id="set-budget-btn">Set Budget</button>
          </div>
        </div>

        <div class="panel-card">
          <h2 class="panel-title">Add Expense</h2>
          <div class="expense-form">
            <input type="text" id="expense-name" placeholder="Expense name (e.g. Lunch)" />
            <div class="input-row">
              <div class="input-wrapper">
                <span class="input-prefix">₹</span>
                <input type="number" id="expense-amount" placeholder="Amount" min="0" />
              </div>
              <button class="btn btn-accent" id="add-expense-btn">+ Add</button>
            </div>
            <div class="category-grid" id="category-grid">
              <button class="cat-btn active" data-cat="Food">🥗 Food</button>
              <button class="cat-btn" data-cat="Transport">🚌 Transport</button>
              <button class="cat-btn" data-cat="Shopping">🛍 Shopping</button>
              <button class="cat-btn" data-cat="Bills">⚡ Bills</button>
              <button class="cat-btn" data-cat="Health">💊 Health</button>
              <button class="cat-btn" data-cat="Other">📦 Other</button>
            </div>
          </div>
        </div>

        <div class="panel-card chart-card">
          <h2 class="panel-title">By Category</h2>
          <div class="chart-wrapper">
            <canvas id="donut-chart"></canvas>
            <div class="chart-center" id="chart-center">
              <span class="chart-center-label">Spent</span>
              <span class="chart-center-value" id="chart-center-value">₹0</span>
            </div>
          </div>
          <div class="chart-legend" id="chart-legend"></div>
        </div>

      </div>

      <div class="right-panel">
        <div class="panel-card expenses-card">
          <div class="expenses-header">
            <h2 class="panel-title">Expenses</h2>
            <div class="expenses-controls">
              <select id="filter-cat" class="filter-select">
                <option value="All">All Categories</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Health">Health</option>
                <option value="Other">Other</option>
              </select>
              <button class="btn btn-danger-outline" id="clear-all-btn">Clear All</button>
            </div>
          </div>

          <div id="expense-list" class="expense-list">
            <div class="empty-state" id="empty-state">
              <span class="empty-icon">🧾</span>
              <p>No expenses yet</p>
              <span>Add your first expense to get started</span>
            </div>
          </div>

          <div class="export-row">
            <button class="btn btn-outline" id="export-csv-btn">↓ Export CSV</button>
          </div>
        </div>
      </div>

    </div>

    <div class="toast" id="toast"></div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/chart-helper.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
